<script>
/* ══════════════════════════════════════
   SHARED STATE & STORAGE
══════════════════════════════════════ */
let trades=[], cal={}, pendingBayes=[], bankroll=500, deferredPrompt=null;
let currentImg=null, currentTradeId=null;

const LS = {
  get:(k,def)=>{try{return JSON.parse(localStorage.getItem(k))||def}catch{return def}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  raw:(k,def='')=>localStorage.getItem(k)||def,
  rawSet:(k,v)=>localStorage.setItem(k,v),
};

function loadAll(){
  trades=LS.get('pm-trades',[]);
  cal=LS.get('pm-cal',{});
  pendingBayes=LS.get('pm-bayes',[]);
  bankroll=parseInt(LS.raw('pm-bank','500'));
}
function saveAll(){
  LS.set('pm-trades',trades);
  LS.set('pm-cal',cal);
  LS.set('pm-bayes',pendingBayes);
}

/* ══════════════════════════════════════
   MATH ENGINE
══════════════════════════════════════ */
const DB={
  sinner:{name:"Jannik Sinner",rank:1,nat:"🇮🇹",clay:92,hard:88,grass:74,inj:null},
  alcaraz:{name:"Carlos Alcaraz",rank:2,nat:"🇪🇸",clay:88,hard:85,grass:90,inj:"손목"},
  zverev:{name:"Alexander Zverev",rank:3,nat:"🇩🇪",clay:82,hard:80,grass:68,inj:null},
  djokovic:{name:"Novak Djokovic",rank:4,nat:"🇷🇸",clay:88,hard:87,grass:86,inj:"어깨"},
  medvedev:{name:"Daniil Medvedev",rank:9,nat:"🇷🇺",clay:74,hard:84,grass:72,inj:null},
  swiatek:{name:"Iga Swiatek",rank:1,nat:"🇵🇱",clay:94,hard:82,grass:72,inj:null},
  sabalenka:{name:"Aryna Sabalenka",rank:2,nat:"🇧🇾",clay:84,hard:90,grass:78,inj:null},
  gauff:{name:"Coco Gauff",rank:3,nat:"🇺🇸",clay:80,hard:82,grass:76,inj:null},
  andreeva:{name:"Mirra Andreeva",rank:9,nat:"🇷🇺",clay:82,hard:76,grass:68,inj:null},
};

function findP(name){
  if(!name)return null;
  const n=name.toLowerCase();
  return Object.values(DB).find(p=>n.includes(p.name.split(" ").pop().toLowerCase())||p.name.toLowerCase().includes(n));
}

function tennisEst(p1n,p2n,surf){
  const p1=findP(p1n),p2=findP(p2n);
  if(!p1||!p2)return null;
  const s=surf||"clay";
  let b=p1[s]/(p1[s]+p2[s])*100+(p2.rank-p1.rank)*0.15;
  if(p1.inj)b-=8;if(p2.inj)b+=8;
  return Math.min(Math.max(b,5),95);
}

function calcEV(p,price){return{ev:p*(1-price)-(1-p)*price,roi:(p*(1-price)-(1-p)*price)/price*100}}

function calcKelly(p,price,bank){
  const b=(1-price)/price,fk=(p*b-(1-p))/b;
  if(fk<=0)return null;
  const adj=Math.min(fk*0.25,0.05),bet=bank*adj;
  return{fk:(fk*100).toFixed(1),adj:(adj*100).toFixed(1),bet:bet.toFixed(0),ct:Math.floor(bet/price),profit:(Math.floor(bet/price)*(1-price)).toFixed(0)};
}

function bayesChain(prior,items){
  let p=prior/100; const log=[];
  for(const it of(items||[])){
    if(!it.label||!it.pT||!it.pF)continue;
    const prev=p,num=(parseFloat(it.pT)/100)*p;
    p=num/(num+(parseFloat(it.pF)/100)*(1-p));
    log.push({label:it.label,from:(prev*100).toFixed(1),to:(p*100).toFixed(1),lr:(it.pT/it.pF).toFixed(2)});
  }
  return{prob:p,log};
}

function zone(price){
  if(price<0.05)return{l:"극단위험",c:"#ff2255",skip:true};
  if(price<0.10)return{l:"위험",c:"#ff4466",skip:true};
  if(price<0.30)return{l:"주의",c:"#ffd60a",skip:false};
  if(price<0.70)return{l:"적정",c:"#00ff88",skip:false};
  if(price<0.90)return{l:"양호",c:"#00ff88",skip:false};
  return{l:"근확실성",c:"#00e5ff",skip:false};
}

function getCalBias(sport,surf){
  const key=`${sport||"other"}_${surf||"any"}`;
  const d=cal[key];
  if(!d||d.total<5)return 0;
  return((d.wins/d.total)-(d.sumProb/d.total))*100;
}

function runAnalysis(price,prior,bayesItems,bank){
  const allItems=[...(bayesItems||[]),...pendingBayes];
  const{prob,log}=bayesChain(prior,allItems);
  const{ev,roi}=calcEV(prob,price);
  const kl=ev>0?calcKelly(prob,price,bank||bankroll):null;
  const z=zone(price);
  let verdict,vc;
  if(z.skip||ev<=0){verdict="SKIP";vc=C.rd}
  else if(ev<0.03){verdict="WAIT";vc=C.yw}
  else{verdict="BUY";vc=C.gr}
  return{prob,log,ev,roi,kl,z,verdict,vc,price,prior};
}

const C={ac:"#00e5ff",gr:"#00ff88",yw:"#ffd60a",rd:"#ff3d5a",pu:"#b388ff",mu:"#2a4055",tx:"#7090a8",br:"#dde8f0"};

/* ══════════════════════════════════════
   CLAUDE API
══════════════════════════════════════ */
function getKey(){return LS.raw('pm-apikey')}

async function claude(messages,tools=[],max=1500){
  const key=getKey();
  if(!key)throw new Error("API 키 없음 — 설정에서 입력");
  const body={model:"claude-opus-4-5",max_tokens:max,messages};
  if(tools.length)body.tools=tools;
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body)
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d;
}

async function scanImage(b64,mime){
  const key=getKey();
  if(!key)throw new Error("API 키 없음");
  const sys=`You are a Polymarket prediction market analyst. Analyze this screenshot and respond ONLY with valid JSON (no markdown, no explanation):
{"market_name":"string or Unknown","sport":"tennis|basketball|soccer|crypto|other","yes_price":null,"volume_24h":null,"live":false,"player1":null,"player2":null,"score_p1":null,"score_p2":null,"set_score":null,"current_game":null,"tournament":null,"surface":null,"round":null,"win_prob_p1":null,"injury_info":null,"situation_ko":"이 스크린샷에 대한 간단한 설명","edge_ko":"베팅 기회 분석","bayes_items":[{"label":"상황 설명","pT":55,"pF":45}],"recommended":"WAIT","confidence":"LOW"}`;
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:"claude-opus-4-5",
      max_tokens:1200,
      system:sys,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:mime,data:b64}},
        {type:"text",text:"이 스크린샷을 분석해주세요. 반드시 JSON만 응답하세요."}
      ]}]
    })
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  const allText=d.content?.filter(c=>c.type==="text").map(c=>c.text).join("")||"";
  if(!allText)throw new Error("AI 응답 없음 - 스크린샷을 다시 올려주세요");
  const clean=allText.replace(/```json|```/g,"").trim();
  // Try to extract JSON even if there's extra text
  const jsonMatch=clean.match(/\{[\s\S]*\}/);
  if(!jsonMatch)throw new Error("JSON 파싱 실패");
  try{return JSON.parse(jsonMatch[0])}
  catch(e){
    // Return minimal valid object so analysis can still proceed
    return {market_name:"Unknown",sport:"other",yes_price:null,situation_ko:"스크린샷 분석 완료",edge_ko:"수동으로 가격을 입력해주세요",bayes_items:[],recommended:"WAIT",confidence:"LOW"};
  }
}

async function fetchOracle(query){
  const prompt=query
    ?`Search Oracle by Polymarket articles about: "${query}" from news.polymarket.com`
    :`Search the 4 most recent articles from news.polymarket.com Oracle newsletter`;
  const d=await claude([{role:"user",content:prompt+`
Return ONLY JSON array (no markdown):
[{"title":"string","date":"string","url":"https://news.polymarket.com/p/...","tag":"Korean tag","summary_ko":"2-3 Korean sentences","key_insight_ko":"1 Korean sentence","polymarket_links":[{"q":"market question","url":"poly.market/..."}],"bayes_items":[{"label":"Korean","pT":number,"pF":number}],"sentiment":"bullish|bearish|neutral"}]`}],
    [{type:"web_search_20250305",name:"web_search"}],2500);
  const texts=d.content?.filter(c=>c.type==="text").map(c=>c.text).join("")||"";
  const m=texts.match(/\[[\s\S]*?\]/);
  if(!m)return[];
  try{return JSON.parse(m[0])}catch{return[]}
}

/* ══════════════════════════════════════
   TRADE MANAGEMENT
══════════════════════════════════════ */
function saveTrade(data){
  const id=Date.now();
  trades.unshift({id,ts:new Date().toISOString(),...data,outcome:null,pnl:null});
  saveAll();
  currentTradeId=id;
  updateHeader();
  document.getElementById('log-cnt').textContent=trades.length;
  return id;
}

function markOutcome(id,won){
  const t=trades.find(x=>x.id===id);
  if(!t||t.outcome)return;
  const price=t.price||0.5, bet=parseFloat(t.bet||0);
  t.outcome=won?"WIN":"LOSS";
  t.pnl=won?parseFloat((bet/price*(1-price)).toFixed(2)):-bet;
  // Save counterfactual PnL if entered
  const cfInp=document.getElementById('cf-inp-'+id);
  if(cfInp&&cfInp.value){t.held_pnl=parseFloat(cfInp.value)||null}
  // Update calibration
  const key=`${t.sport||"other"}_${t.surface||"any"}`;
  if(!cal[key])cal[key]={total:0,wins:0,sumProb:0};
  cal[key].total++;cal[key].wins+=(won?1:0);cal[key].sumProb+=(t.myProb||0.5);
  saveAll();updateHeader();
  toast(won?`✅ WIN +$${t.pnl}`:`❌ LOSS -$${Math.abs(t.pnl)}`,won?C.gr:C.rd);

  const t=document.createElement("div");

function updateHeader(){
  const res=trades.filter(t=>t.outcome);
  const wins=res.filter(t=>t.outcome==="WIN").length;
  const pnl=res.reduce((a,t)=>a+(t.pnl||0),0);
  const wr=res.length?Math.round(wins/res.length*100)+"%":"--";
  const we=document.getElementById('s-wr');if(we){we.textContent=wr;we.style.color=wins>res.length*0.55?C.gr:C.tx}
  const pe=document.getElementById('s-pnl');if(pe){pe.textContent=(pnl>=0?"+":"")+pnl.toFixed(1);pe.style.color=pnl>=0?C.gr:C.rd}
}

function onFile(e){processFile(e.target.files[0])}

async function processFile(file){
  if(!file?.type.startsWith('image/'))return;
  if(!getKey()){toast("API 키를 먼저 입력하세요",C.rd);return}
  const reader=new FileReader();
  reader.onload=async e=>{
    currentImg=e.target.result;
    document.getElementById('tab-scan').innerHTML=`<div style="padding:12px;text-align:center;padding-top:40px">
      <img src="${currentImg}" style="width:100%;max-height:140px;object-fit:cover;border-radius:7px;margin-bottom:16px;border:1px solid var(--bd)">
      <div class="spin"></div>
      <div style="font-size:11px;color:${C.ac};letter-spacing:2px;margin:12px 0 5px">AI 분석 중...</div>
      <div style="font-size:10px;color:var(--mu);margin-bottom:12px">Claude Vision이 경기를 읽고 있습니다</div>
      <div class="prog" style="max-width:200px;margin:0 auto"><div class="prog-f" id="scan-prog" style="width:15%"></div></div>
    </div>`;
    try{
      setP(40);
      const ai=await scanImage(currentImg.split(",")[1],file.type);
      setP(75);
      if(!ai)throw new Error("AI 응답 없음");
      const price=ai.yes_price;
      const tEst=tennisEst(ai.player1,ai.player2,ai.surface);
      const calBias=getCalBias(ai.sport,ai.surface);
      const rawPrior=ai.win_prob_p1??tEst??(price?price*100:null);
      const prior=rawPrior?Math.min(Math.max(rawPrior+calBias,5),95):null;
      let analysis=null;
      if(price&&price>0&&price<1&&prior){
        analysis=runAnalysis(price,prior,ai.bayes_items,bankroll);
        analysis.tEst=tEst;analysis.calBias=calBias;
      }
      const tradeId=price?saveTrade({
        market:ai.market_name||"Unknown",sport:ai.sport,surface:ai.surface,
        player1:ai.player1,player2:ai.player2,tournament:ai.tournament,
        price,myProb:analysis?.prob,ev:analysis?.ev,verdict:analysis?.verdict,
        bet:analysis?.kl?.bet||"0",calBias
      }):null;
      setP(100);
      setTimeout(()=>renderScanResult(ai,analysis,tradeId),200);
    }catch(err){
      document.getElementById('tab-scan').innerHTML=`<div style="padding:12px">
        <div class="sec" style="border-color:${C.rd}44">
          <div style="font-size:11px;color:${C.rd};margin-bottom:8px">⚠ 오류: ${err.message}</div>
          <button class="btn btn-out" onclick="renderScanUpload()">다시 시도</button>
        </div>
      </div>`;
    }
  };
  reader.readAsDataURL(file);
}

/* ══════════════════════════════════════
   INFORMATION THEORY ENGINE (Shannon/0xDipper)
══════════════════════════════════════ */
function shannonEntropy(p){
  p=Math.max(0.001,Math.min(0.999,p));
  const q=1-p;
  return -(p*Math.log2(p)+q*Math.log2(q));
}

function klDivBinary(pMine,pMkt){
  pMine=Math.max(0.01,Math.min(0.99,pMine));
  pMkt=Math.max(0.01,Math.min(0.99,pMkt));
  const q=1-pMine, qm=1-pMkt;
  return pMine*Math.log2(pMine/pMkt)+q*Math.log2(q/qm);
}

function calcKL(){
  const mineEl=document.getElementById('kl-mine');
  const mktEl=document.getElementById('kl-mkt');
  const res=document.getElementById('kl-result');
  if(!mineEl||!mktEl||!res)return;
  const pMine=parseFloat(mineEl.value)/100;
  const pMkt=parseFloat(mktEl.value);
  if(isNaN(pMine)||isNaN(pMkt)||pMine<=0||pMkt<=0){res.innerHTML=`<span style="color:var(--mu)">값 입력 시 자동 계산</span>`;return}
  const kl=klDivBinary(pMine,pMkt);
  const hMkt=shannonEntropy(pMkt);
  const hMine=shannonEntropy(pMine);
  const ev=pMine*(1-pMkt)-(1-pMine)*pMkt;

  let verdict,vc,desc;
  if(kl>0.30){verdict="⚠ 계산 확인";vc=C.rd;desc="KL>0.30 — 내 모델이 틀렸을 가능성"}
  else if(kl>=0.10){verdict="BUY";vc=C.gr;desc="진짜 엣지 · 프로 구간"}
  else if(kl>=0.05){verdict="WAIT";vc=C.yw;desc="경계 구간 · 수수료 고려"}
  else{verdict="SKIP";vc=C.rd;desc="엣지 없음 · 통과"}

  res.innerHTML=`<div style="text-align:left">
    <div style="text-align:center;margin-bottom:10px">
      <div style="font-size:24px;font-weight:700;color:${vc}">${kl.toFixed(4)} bit</div>
      <div style="font-size:10px;color:${vc};margin-top:2px">${verdict} — ${desc}</div>
    </div>
    <div class="g3">
      ${kv("내 확률",(pMine*100).toFixed(1)+"%",C.ac)}
      ${kv("시장가격",(pMkt*100).toFixed(1)+"%")}
      ${kv("EV",(ev>0?"+":"")+ev.toFixed(4),ev>0?C.gr:C.rd)}
    </div>
    <div class="g2" style="margin-top:6px">
      ${kv("H(시장)",hMkt.toFixed(4)+" bit")}
      ${kv("H(내모델)",hMine.toFixed(4)+" bit")}
    </div>
    <div style="margin-top:8px">
      <div style="height:4px;background:var(--bd);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${Math.min(100,(kl/0.30)*100)}%;background:${vc};border-radius:2px;transition:width .3s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:8px;color:${C.mu};margin-top:2px">
        <span>0 SKIP</span><span style="color:${C.yw}">0.05</span><span style="color:${C.gr}">0.10 TRADE</span><span>0.30</span>
      </div>
    </div>
  </div>`;
}

function calcMaxEntropy(){
  const rows=document.querySelectorAll('.me-row');
  const res=document.getElementById('me-result');if(!res)return;
  const signals=[];
  rows.forEach(r=>{
    const p=parseFloat(r.querySelector('.me-prob')?.value)/100;
    const w=parseFloat(r.querySelector('.me-conf')?.value)||1;
    const l=r.querySelector('.me-label')?.value||'';
    if(!isNaN(p)&&p>0&&p<1)signals.push({p,w,l});
  });
  if(signals.length===0){res.innerHTML=`<span style="color:var(--mu)">신호 입력 시 자동 계산</span>`;return}

  const totalW=signals.reduce((a,s)=>a+s.w,0);
  const fused=Math.max(0.01,Math.min(0.99,signals.reduce((a,s)=>a+s.p*s.w,0)/totalW));
  const hFused=shannonEntropy(fused);

  // KL from each signal to fused
  const divergences=signals.map(s=>({...s,kl:klDivBinary(s.p,fused)}));

  res.innerHTML=`<div style="text-align:left">
    <div style="text-align:center;margin-bottom:10px">
      <div style="font-size:22px;font-weight:700;color:${C.pu}">${(fused*100).toFixed(2)}%</div>
      <div style="font-size:9px;color:${C.mu};margin-top:2px">Max-Entropy 융합 확률 · H=${hFused.toFixed(3)} bit</div>
    </div>
    ${divergences.map(s=>{
      const bar=Math.min(100,(s.w/totalW)*100);
      return`<div style="margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;font-size:9px;margin-bottom:2px">
          <span style="color:var(--br)">${s.l||'신호'}</span>
          <span style="color:${C.mu}">p=${(s.p*100).toFixed(1)}% · w=${s.w} · KL=${s.kl.toFixed(4)}bit</span>
        </div>
        <div style="height:3px;background:var(--bd);border-radius:2px">
          <div style="height:100%;width:${bar.toFixed(0)}%;background:${C.pu}88;border-radius:2px"></div>
        </div>
      </div>`;
    }).join('')}
    <div style="margin-top:8px;padding:8px;background:${C.pu}0e;border:1px solid ${C.pu}33;border-radius:4px">
      ${kv("융합 확률",(fused*100).toFixed(2)+"%",C.pu)}
      ${kv("엔트로피",hFused.toFixed(4)+" bit")}
    </div>
    <button onclick="document.getElementById('e-price').value='${fused.toFixed(3)}';document.getElementById('kl-mkt').value='${fused.toFixed(3)}';calcKL();toast('Max-Entropy 확률 적용',C.pu)" style="width:100%;margin-top:8px;padding:6px;background:${C.pu}18;border:1px solid ${C.pu}44;border-radius:3px;color:${C.pu};font-family:var(--fn);font-size:9px;cursor:pointer">↳ KL 계산기에 적용</button>
  </div>`;
}

function calcInsider(){
  const raw=document.getElementById('id-prices')?.value;
  const win=parseInt(document.getElementById('id-win')?.value)||6;
  const k=parseFloat(document.getElementById('id-k')?.value)||3;
  const res=document.getElementById('id-result');if(!res)return;
  if(!raw){res.innerHTML=`<span style="color:var(--mu)">가격 시계열 입력 시 분석</span>`;return}

  const prices=raw.split(',').map(s=>parseFloat(s.trim())).filter(p=>!isNaN(p)&&p>0&&p<1);
  if(prices.length<win+2){res.innerHTML=`<span style="color:${C.yw}">최소 ${win+2}개 데이터 필요</span>`;return}

  const H=prices.map(p=>shannonEntropy(p));
  const dH=H.map((h,i)=>i===0?0:h-H[i-1]);

  // Rolling std of dH
  const alerts=[];
  for(let i=win;i<dH.length;i++){
    const window_=dH.slice(i-win,i);
    const mean=window_.reduce((a,b)=>a+b,0)/win;
    const std=Math.sqrt(window_.reduce((a,b)=>a+(b-mean)**2,0)/win)||0.0001;
    const sigma=Math.abs(dH[i])/std;
    if(sigma>k){
      alerts.push({idx:i, price:prices[i], H:H[i].toFixed(4), dH:dH[i].toFixed(4), sigma:sigma.toFixed(1)});
    }
  }

  const entropyBars=H.map((h,i)=>{
    const isAlert=alerts.find(a=>a.idx===i);
    const barW=Math.round(h*100);
    return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
      <span style="font-size:8px;color:${C.mu};width:16px;text-align:right">${i+1}</span>
      <div style="flex:1;height:5px;background:var(--bd);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${barW}%;background:${isAlert?C.rd:C.ac}88;border-radius:2px"></div>
      </div>
      <span style="font-size:8px;color:${isAlert?C.rd:C.mu};width:42px;text-align:right">${h.toFixed(3)}bit${isAlert?` ⚠`:''}</span>
    </div>`;
  }).join('');

  res.innerHTML=`<div style="text-align:left">
    <div style="font-size:9px;color:${C.mu};margin-bottom:8px">엔트로피 시계열 (${prices.length}개 포인트)</div>
    ${entropyBars}
    <div style="margin-top:10px;padding:8px;background:${alerts.length>0?C.rd:C.gr}18;border:1px solid ${alerts.length>0?C.rd:C.gr}44;border-radius:4px">
      ${alerts.length>0
        ?`<div style="color:${C.rd};font-weight:700;margin-bottom:6px">⚠ 인사이더 의심 ${alerts.length}건 감지</div>
          ${alerts.map(a=>`<div style="font-size:9px;color:${C.rd};margin-bottom:3px">
            #${a.idx+1}: 가격 ${(parseFloat(a.price)*100).toFixed(1)}% · H=${a.H}bit · dH=${a.dH} · <b>${a.sigma}σ</b>
          </div>`).join('')}
          <div style="font-size:9px;color:${C.mu};margin-top:6px;line-height:1.6">공개 뉴스와 비교하세요. 뉴스 없이 발생 → 인사이더 가능성</div>`
        :`<div style="color:${C.gr};font-size:10px">✓ 이상 없음 — 정상 시장 움직임</div>`
      }
    </div>
    <div class="g3" style="margin-top:8px">
      ${kv("데이터",prices.length+"개")}
      ${kv("감지임계",k+"σ")}
      ${kv("이상건수",alerts.length+"건",alerts.length>0?C.rd:C.gr)}
    </div>
  </div>`;
}

function o2p(v,fmt){
  const n=parseFloat(v);if(!n||isNaN(n))return null;
  if(fmt==='d')return n>1?1/n:null;
  if(fmt==='a'){if(n>0)return 100/(n+100);if(n<0)return Math.abs(n)/(Math.abs(n)+100);return null}
  return null;
}

let consensusP1=null;
function recalcOdds(){
  const rows=document.querySelectorAll('.bk-r');
  const entries=[];
  let bestP=0,bestName='',bestOdds=0;
  rows.forEach(row=>{
    const p1=o2p(row.querySelector('.bk-p1')?.value,oddsFmt);
    const p2=o2p(row.querySelector('.bk-p2')?.value,oddsFmt);
    const name=row.querySelector('.bk-n')?.value||'';
    if(!p1||!p2)return;
    const tot=p1+p2,p1n=p1/tot,margin=(tot-1)*100;
    entries.push({name,p1n,margin});
    if(p1n>bestP){bestP=p1n;bestName=name;bestOdds=row.querySelector('.bk-p1')?.value}
  });
  const res=document.getElementById('odds-res');
  if(!entries.length){res.style.display='none';consensusP1=null;return}
  const avg=entries.reduce((a,e)=>a+e.p1n,0)/entries.length;
  const avgM=entries.reduce((a,e)=>a+e.margin,0)/entries.length;
  consensusP1=avg;
  const pm=parseFloat(document.getElementById('e-price')?.value)||null;
  const edgePct=pm?((avg-pm)*100).toFixed(1):null;
  const ec=edgePct>2?C.gr:edgePct>0?C.yw:C.rd;
  res.style.display='block';
  res.innerHTML=`<div class="g2" style="margin-bottom:8px">
    <div>${kv("컨센서스",`<b style="color:${C.ac}">${(avg*100).toFixed(1)}%</b>`)}${kv("마켓 마진",avgM.toFixed(2)+"%")}</div>
    <div>${kv("최고 배당",bestName||"--")}${kv("",bestOdds)}</div>
  </div>
  ${pm?`<div style="padding:7px;background:${ec}18;border:1px solid ${ec}44;border-radius:4px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
    <span style="font-size:10px;color:${ec}">${edgePct>0?"폴리마켓 저평가 → BUY":"폴리마켓 고평가 → SKIP"}</span>
    <span style="font-size:14px;font-weight:700;color:${ec}">${edgePct>0?"+":""}${edgePct}%p</span>
  </div>`:''}
  <button onclick="applyConsensus()" style="width:100%;padding:7px;background:${C.pu}18;border:1px solid ${C.pu}44;border-radius:3px;color:${C.pu};font-family:var(--fn);font-size:9px;letter-spacing:1px;cursor:pointer">📊 컨센서스 확률을 분석에 적용</button>`;
}

let edgeSlug='';
function edgeSearch(val){
  clearTimeout(window._est);

  if(!val||val.length<2){sr.style.display='none';return}
  sr.style.display='block';sr.innerHTML=`<div style="padding:10px;text-align:center;color:${C.mu};font-size:10px">검색 중...</div>`;
  window._est=setTimeout(async()=>{
    try{
      const r=await fetch(`https://gamma-api.polymarket.com/markets?active=true&limit=8&order=volume24hr&ascending=false&search=${encodeURIComponent(val)}`,{signal:AbortSignal.timeout(5000)});

      if(!ms.length){sr.innerHTML=`<div style="padding:10px;text-align:center;color:${C.mu};font-size:10px">결과 없음</div>`;return}
      window._srData=ms;
      sr.innerHTML=ms.slice(0,8).map((m,i)=>{

function edgePick(i){
  const m=window._srData?.[i];if(!m)return;
  const ask=parseFloat(m.bestAsk||m.outcomePrices?.[0]||0);
  document.getElementById('e-mkt').value=m.question||'';
  if(ask>0)document.getElementById('e-price').value=ask.toFixed(3);
  const q=(m.question||'').toLowerCase();
  if(q.match(/btc|eth|crypto/))document.getElementById('e-cat').value='금융/크립토';
  else if(q.match(/election|fed|rate/))document.getElementById('e-cat').value='정치/기타';

function runEdge(){
  const price=parseFloat(document.getElementById('e-price').value);
  const bank=parseFloat(document.getElementById('e-bank').value)||bankroll;
  const mkt=document.getElementById('e-mkt').value;
  if(!price||price<=0||price>=1){toast("가격을 입력하세요",C.yw);return}
  // TennisONE 컨텍스트를 베이즈 항목에 자동 반영
  const t1ctx=getTennisOneContext();
  if(t1ctx){
    const p1surf=parseFloat(document.getElementById('t1-p1surf')?.value||0);
    const p2surf=parseFloat(document.getElementById('t1-p2surf')?.value||0);
    if(p1surf&&p2surf&&p1surf!==p2surf){
      const advantage=p1surf>p2surf;
      if(!edgeNewsList.find(b=>b.label&&b.label.includes('서피스'))){
        edgeNewsList.push({
          label:`TennisONE: P1 서피스 승률 ${p1surf}% vs P2 ${p2surf}%`,
          pT:String(advantage?Math.round(p1surf):Math.round(100-p1surf)),
          pF:String(advantage?Math.round(p2surf):Math.round(100-p2surf))
        });
      }
    }
    toast('🎾 TennisONE 데이터 반영됨',C.ac);
  }
  const calBias=getCalBias(document.getElementById('e-cat').value,null);
  const prior=Math.min(Math.max(price*100+calBias,1),99);
  const an=runAnalysis(price,prior,edgeNewsList,bank);
  edgeResult={...an,mkt,calBias};
  const{prob,log,ev,roi,kl,z,verdict,vc}=an;
  const glow=`0 0 24px ${vc}44`;
  const res=document.getElementById('e-result');
  res.innerHTML=`<div class="fade">
    <div class="sec" style="text-align:center;box-shadow:${glow}">
      <div style="font-size:9px;letter-spacing:3px;color:${C.mu};margin-bottom:6px">${(mkt||"").substring(0,50)}</div>
      <div class="v-badge" style="background:${vc}1a;border:1px solid ${vc};color:${vc}">${verdict}</div>
      <div>${tag("Yes $"+price,vc)}${tag(z.l,z.c)}</div>
    </div>
    <div class="g2">
      <div class="sec"><div class="stitle">베이즈</div>
        ${kv("시작",prior.toFixed(1)+"%")}
        ${log.map(l=>`<div class="kv" style="flex-direction:column;align-items:flex-start"><span style="font-size:10px;color:var(--br)">${l.label}</span><span style="font-size:9px;color:${C.mu}">LR=${l.lr} <span style="color:${C.yw}">${l.from}%</span>→<span style="color:${C.gr}">${l.to}%</span></span></div>`).join("")}
        ${kv("최종",(prob*100).toFixed(1)+"%",C.ac)}
      </div>
      <div class="sec"><div class="stitle">EV·켈리</div>
        ${kv("EV",(ev>0?"+":"")+ev.toFixed(4),ev>0?C.gr:C.rd)}
        ${kv("ROI",(roi>0?"+":"")+roi.toFixed(1)+"%",ev>0?C.gr:C.rd)}
        ${kl?`<hr style="border:none;border-top:1px solid var(--bd);margin:4px 0">
          ${kv("베팅액","$"+kl.bet,C.br)}${kv("계약수",kl.ct+"개")}${kv("최대수익","+$"+kl.profit,C.gr)}
        `:`<div style="font-size:10px;color:${C.rd};margin-top:5px">베팅 없음</div>`}
      </div>
    </div>
    ${verdict!=='SKIP'&&kl?`<button class="btn btn-out" style="margin-top:0" onclick="saveEdgeTrade()">💾 거래 저장</button>`:''}
  </div>`;
}

function saveEdgeTrade(){
  if(!edgeResult)return;
  const{prob,ev,kl,verdict,price,mkt}=edgeResult;
  saveTrade({market:mkt||"Unknown",sport:document.getElementById('e-cat').value,
    price,myProb:prob,ev,verdict,bet:kl?.bet||"0",slug:edgeSlug});
  toast("거래 저장됨",C.gr);
}

  const a=ORACLE_STATIC[idx];if(!a)return;
  let n=0;
  a.bayes_items?.forEach(b=>{

      pendingBayes.push({label:b.label,pT:String(b.pT),pF:String(b.pF)});n++;
    }
  });
  saveAll();updateBayesBadge();

}

function renderLog(){
  const res=trades.filter(t=>t.outcome);
  const wins=res.filter(t=>t.outcome==="WIN").length;
  const pnl=res.reduce((a,t)=>a+(t.pnl||0),0);
  let h=`<div class="fade" style="padding:12px">
    <div class="g4" style="margin-bottom:10px">
      <div class="stat-b"><div class="sv" style="color:var(--br)">${trades.length}</div><div class="sl">총</div></div>
      <div class="stat-b"><div class="sv" style="color:${C.gr}">${wins}</div><div class="sl">승리</div></div>
      <div class="stat-b"><div class="sv" style="color:${wins>res.length*0.55?C.gr:wins>res.length*0.45?C.yw:C.rd}">${res.length?Math.round(wins/res.length*100)+"%":"--"}</div><div class="sl">승률</div></div>
      <div class="stat-b"><div class="sv" style="color:${pnl>=0?C.gr:C.rd}">${pnl>=0?"+":""}${pnl.toFixed(0)}</div><div class="sl">PnL($)</div></div>
    </div>`;
  if(!trades.length){h+=`<div class="sec" style="text-align:center;padding:28px"><div style="font-size:24px;margin-bottom:8px">📋</div><div style="font-size:11px;color:${C.mu}">저장된 기록 없음</div></div>`}
  else trades.forEach(t=>{
    const cls=t.outcome==="WIN"?"win":t.outcome==="LOSS"?"loss":"";
    const dt=new Date(t.ts).toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
    const pStr=t.pnl!=null?`<b style="color:${t.pnl>=0?C.gr:C.rd}">${t.pnl>=0?"+":""}$${Math.abs(t.pnl)}</b>`:'';
    const btns=t.outcome?`<span style="color:${t.outcome==="WIN"?C.gr:C.rd};font-size:10px;font-weight:700">${t.outcome}</span> ${pStr}`
      :`<div style="display:flex;gap:4px"><button class="btn-win" onclick="markOutcome(${t.id},true)">WIN</button><button class="btn-loss" onclick="markOutcome(${t.id},false)">LOSS</button></div>`;
    h+=`<div class="trade-card ${cls}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">
        <div style="flex:1;min-width:0"><div style="font-size:11px;color:var(--br);font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.market||"(없음)"}</div>
          <div style="font-size:9px;color:${C.mu};margin-top:1px">${t.sport||""} · $${t.price||"--"} · ${t.myProb?(t.myProb*100).toFixed(1)+"%":"--"}</div></div>
        <button onclick="delTrade(${t.id})" class="btn-sm" style="margin-left:6px;flex-shrink:0">✕</button>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        ${btns}
        <span style="font-size:8px;color:${C.mu}">${dt}</span>
      </div>
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('tab-log').innerHTML=h;
}

function renderCalTab(){
  const entries=Object.entries(cal);
  let h=`<div class="fade" style="padding:12px">
    <div class="sec"><div class="stitle">예측 보정 현황</div>
    ${!entries.length?`<div style="font-size:11px;color:${C.mu};text-align:center;padding:16px">WIN/LOSS 5건 이상 입력 시 자동 보정 시작</div>`:
    entries.map(([key,d])=>{
      const parts=key.split("_"),sport=parts[0],surf=parts[1]==="any"?"전체":parts[1];
      const expWR=(d.sumProb/d.total*100).toFixed(1),actWR=(d.wins/d.total*100).toFixed(1);
      const bias=((d.wins/d.total)-(d.sumProb/d.total))*100;
      const bc=Math.abs(bias)<2?C.mu:bias>0?C.gr:C.rd;
      return`<div style="background:var(--p2);border-radius:4px;padding:10px;margin-bottom:7px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <b style="font-size:11px;color:var(--br)">${sport}·${surf}</b>
          <span style="font-size:9px;color:${C.mu}">${d.total}건 ${d.total<5?`(${5-d.total}건 더 필요)`:'✓'}</span>
        </div>
        <div class="g3">${kv("예측",expWR+"%")}${kv("실제",actWR+"%",parseFloat(actWR)>parseFloat(expWR)?C.gr:C.rd)}${kv("보정",(bias>0?"+":"")+bias.toFixed(1)+"%p",bc)}</div>
        <div style="font-size:9px;color:${bc};margin-top:4px">${Math.abs(bias)<2?"✓ 보정 불필요":bias>0?`↑ +${bias.toFixed(1)}%p 상향 적용 중`:`↓ ${bias.toFixed(1)}%p 하향 적용 중`}</div>
      </div>`;
    }).join("")}
    </div>

    <!-- Pending Bayes -->
    ${pendingBayes.length?`<div class="sec" style="border-color:${C.pu}44">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="stitle" style="margin:0;color:${C.pu}">⟳ Oracle 베이즈 대기</div>
        <button onclick="clearBayes();renderCalTab()" class="btn-sm" style="color:${C.rd};border-color:${C.rd}33">전체삭제</button>
      </div>
      ${pendingBayes.map((b,i)=>`<div class="bayes-row"><div style="flex:1"><div style="font-size:10px;color:var(--br)">${b.label}</div><div style="font-size:9px;color:${C.mu}">P(YES)=${b.pT}% · P(NO)=${b.pF}% · LR=${(b.pT/b.pF).toFixed(2)}</div></div><button onclick="pendingBayes.splice(${i},1);saveAll();updateBayesBadge();renderCalTab()" style="background:none;border:none;color:${C.mu};cursor:pointer;font-family:var(--fn)">✕</button></div>`).join('')}
    </div>`:''}

    <!-- Settings -->
    <div class="sec">
      <div class="stitle">⚙️ 설정</div>
      <div style="font-size:9px;color:${C.mu};margin-bottom:3px">Claude API Key</div>
      <div style="display:flex;gap:6px;margin-bottom:4px">
        <input type="password" id="cfg-key" value="${getKey()}" placeholder="sk-ant-..." style="font-size:11px">
        <button onclick="saveKeyCfg()" style="padding:7px 12px;background:${C.ac};color:#000;border:none;border-radius:4px;font-family:var(--fn);font-weight:700;font-size:10px;cursor:pointer;white-space:nowrap">저장</button>
      </div>
      <div id="cfg-st" style="font-size:9px;color:${getKey()?C.gr:C.rd};margin-bottom:8px">${getKey()?'✓ 설정됨':'⚠ 미설정'}</div>
      <div style="font-size:9px;color:${C.mu};margin-bottom:3px">잔고 (USDC)</div>
      <input type="number" value="${bankroll}" onchange="bankroll=+this.value;LS.rawSet('pm-bank',bankroll)" style="max-width:120px;text-align:center">
    </div>
  </div>`;
  document.getElementById('tab-cal').innerHTML=h;
}

function updateTennisContext(){
  const p1form=document.getElementById('t1-p1form')?.value;
  const p2form=document.getElementById('t1-p2form')?.value;
  const p1surf=document.getElementById('t1-p1surf')?.value;
  const p2surf=document.getElementById('t1-p2surf')?.value;
  const h2h=document.getElementById('t1-h2h')?.value;
  const score=document.getElementById('t1-score')?.value;
  const note=document.getElementById('t1-note')?.value;
  const preview=document.getElementById('t1-preview');
  if(!preview)return;
  const lines=[];
  if(p1form)lines.push(`P1 최근폼: ${p1form}`);
  if(p2form)lines.push(`P2 최근폼: ${p2form}`);
  if(p1surf)lines.push(`P1 서피스 승률: ${p1surf}%`);
  if(p2surf)lines.push(`P2 서피스 승률: ${p2surf}%`);
  if(h2h)lines.push(`H2H: ${h2h}`);
  if(score)lines.push(`현재 스코어: ${score}`);
  if(note)lines.push(`메모: ${note}`);
  if(lines.length){
    preview.style.display='block';
    preview.textContent='📊 TennisONE 데이터:\n'+lines.join(' | ');
    window._tennisOneContext=lines.join('\n');
  } else {
    preview.style.display='none';
    window._tennisOneContext='';
  }
}

function gaussianCDF(x, mean, std){
  // Approximation of normal CDF
  const z=(x-mean)/(std*Math.SQRT2);
  return 0.5*(1+erf(z));
}
function erf(x){
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign=x<0?-1:1; x=Math.abs(x);
  const t=1/(1+p*x);
  const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return sign*y;
}

function forecastToBinProbs(mean, std, edges){
  const probs=[];
  for(let i=0;i<edges.length-1;i++){
    const p=gaussianCDF(edges[i+1],mean,std)-gaussianCDF(edges[i],mean,std);
    probs.push(Math.max(0,p));
  }
  const sum=probs.reduce((a,b)=>a+b,0)||1;
  return probs.map(p=>p/sum);
}

function kellyFraction(modelP, marketP, frac=0.25){
  if(marketP<=0||marketP>=modelP)return 0;
  const b=(1-marketP)/marketP;
  const q=1-modelP;
  const fk=(b*modelP-q)/b;
  return Math.max(0,fk*frac);
}

function selectTrades(modelProbs, marketProbs, modelStd, baseStd=8){
  const core=[], hedges=[];
  const highUnc = modelStd > baseStd * 0.95;
  for(let i=0;i<modelProbs.length;i++){
    const edgePp=(modelProbs[i]-marketProbs[i])*100;
    if(edgePp>10){
      core.push({bin:i, edgePp:edgePp.toFixed(1), kelly:kellyFraction(modelProbs[i],marketProbs[i])});
    } else if(highUnc && marketProbs[i]<0.05 && modelProbs[i]>0.03){
      hedges.push({bin:i, edgePp:edgePp.toFixed(1), stake:0.05, type:'tail'});
    }
  }
  if(highUnc){
    [0, modelProbs.length-1].forEach(i=>{
      if(marketProbs[i]<0.05 && !hedges.find(h=>h.bin===i)){
        hedges.push({bin:i, edgePp:((modelProbs[i]-marketProbs[i])*100).toFixed(1), stake:0.025, type:'extreme'});
      }
    });
  }
  return {core, hedges, highUnc};
}

function calcSniper(){
  const mkt=parseFloat(document.getElementById('sniper-mkt')?.value);
  const model=parseFloat(document.getElementById('sniper-model')?.value)/100;
  const bet=parseFloat(document.getElementById('sniper-bet')?.value)||25;

  const payout=bet/mkt;          // 계약수 × $1
  const profit=payout-bet;       // 순수익
  const roi=((profit/bet)*100);
  const ev=model*(1-mkt)-(1-model)*mkt;
  const kl=klDivBinary(model,mkt);
  const multiplier=(payout/bet).toFixed(0);

  const isSniperZone=mkt<=0.05;
  const hasEdge=ev>0&&kl>=0.05;
  const verdict=!hasEdge?'SKIP':isSniperZone?'SNIPER':'BUY';
  const vc=verdict==='SNIPER'?C.pu:verdict==='BUY'?C.gr:C.rd;

  res.innerHTML=`<div style="text-align:left">

      <div class="stat-b"><div class="sv" style="color:${C.ac};font-size:16px">×${multiplier}</div><div class="sl">배율</div></div>
      <div class="stat-b"><div class="sv" style="color:${C.gr};font-size:16px">+$${profit.toFixed(0)}</div><div class="sl">순수익</div></div>
      <div class="stat-b"><div class="sv" style="color:${ev>0?C.gr:C.rd};font-size:14px">${roi.toFixed(0)}%</div><div class="sl">ROI</div></div>
    </div>
    <div class="g2">
      ${kv("EV",(ev>0?"+":"")+ev.toFixed(4),ev>0?C.gr:C.rd)}
      ${kv("베팅액","$"+bet+" → $"+payout.toFixed(0),C.br)}
    </div>
    ${isSniperZone&&hasEdge?`<div style="margin-top:8px;padding:7px;background:${C.pu}18;border:1px solid ${C.pu}44;border-radius:4px;font-size:9px;color:${C.pu};line-height:1.6">

    </div>`:''}
  </div>`;
}

function calc3ModelConsensus(){
  const gfs=parseFloat(document.getElementById('w-gfs-m')?.value);
  const ecmwf=parseFloat(document.getElementById('w-ecmwf-m')?.value);
  const icon=parseFloat(document.getElementById('w-icon-m')?.value);
  const res=document.getElementById('w-consensus-res');
  if(!res)return;
  const vals=[gfs,ecmwf,icon].filter(v=>!isNaN(v));
  if(vals.length<2){res.innerHTML='';return}
  const spread=Math.max(...vals)-Math.min(...vals);
  const agree=spread<=3;
  const center=vals.reduce((a,b)=>a+b,0)/vals.length;
  // Find closest pair
  const pairs=[{a:gfs,b:ecmwf,n:'GFS-ECMWF'},{a:gfs,b:icon,n:'GFS-ICON'},{a:ecmwf,b:icon,n:'ECMWF-ICON'}].filter(p=>!isNaN(p.a)&&!isNaN(p.b));
  const closest=pairs.sort((a,b)=>Math.abs(a.a-a.b)-Math.abs(b.a-b.b))[0];
  const outlierVal=vals.length===3?[gfs,ecmwf,icon].find(v=>v!==closest.a&&v!==closest.b):null;
  const bias=parseFloat(wState.cityBias)||0;
  const adjCenter=center+bias;
  res.innerHTML=`<div style="padding:8px;background:${agree?C.gr:C.rd}18;border:1px solid ${agree?C.gr:C.rd}44;border-radius:4px">
    <div style="font-size:10px;color:${agree?C.gr:C.rd};font-weight:700;margin-bottom:6px">${agree?`✅ 모델 합의 (spread ${spread.toFixed(1)}°C)`:`❌ SKIP — 모델 분산 ${spread.toFixed(1)}°C > 3°C`}</div>
    <div class="g3">
      ${kv("중심값",center.toFixed(1)+"°")}
      ${bias?kv("도시보정",`+${bias}° → ${adjCenter.toFixed(1)}°`,C.yw):kv("Spread",spread.toFixed(1)+"°")}
      ${closest?kv("근접쌍",closest.n):''}
    </div>
    ${outlierVal!=null?`<div style="font-size:9px;color:${C.mu};margin-top:4px">아웃라이어: ${outlierVal.toFixed(1)}° (3개 모두 있을 때만)</div>`:''}
    ${agree?`<button onclick="document.getElementById('w-gfs-m').value='${adjCenter.toFixed(1)}';wState.gfsMean='${adjCenter.toFixed(1)}';toast('중심값 적용됨',C.ac)" style="margin-top:6px;width:100%;padding:5px;background:${C.ac}18;border:1px solid ${C.ac}44;border-radius:3px;color:${C.ac};font-family:var(--fn);font-size:9px;cursor:pointer">↳ 중심값 GFS에 적용</button>`:''}
  </div>`;
}

function check3BinFilter(){
  const inputs=Array.from(document.querySelectorAll('.w3-bin-price'));
  const prices=inputs.map(i=>parseFloat(i.value)).filter(v=>!isNaN(v)&&v>0);
  const res=document.getElementById('w3-filter-res');
  if(!res||prices.length===0)return;
  const sum=prices.reduce((a,b)=>a+b,0);
  const anyTooLow=prices.some(p=>p<0.01);
  const anyTooHigh=prices.some(p=>p>0.45);
  const mathEdge=sum<=0.95;
  const pass=mathEdge&&!anyTooLow&&!anyTooHigh;
  const checks=[
    {label:`합계 ≤ 0.95 (수학적 엣지)`, val:`${sum.toFixed(3)}`, ok:mathEdge},
    {label:`최저가 ≥ 0.01 (미결 구간)`, val:prices.length?`min ${Math.min(...prices).toFixed(3)}`:'--', ok:!anyTooLow},
    {label:`최고가 ≤ 0.45 (과열 방지)`, val:prices.length?`max ${Math.max(...prices).toFixed(3)}`:'--', ok:!anyTooHigh},
  ];
  res.innerHTML=`<div style="padding:8px;background:${pass?C.gr:C.rd}18;border:1px solid ${pass?C.gr:C.rd}44;border-radius:4px">
    <div style="font-size:10px;color:${pass?C.gr:C.rd};font-weight:700;margin-bottom:7px">${pass?'✅ 3-빈 필터 통과 — 진입 가능':'❌ 필터 실패 — 트레이드 SKIP'}</div>
    ${checks.map(c=>`<div style="display:flex;justify-content:space-between;font-size:9px;padding:3px 0;border-bottom:1px solid var(--bd)55">
      <span style="color:${c.ok?C.gr:C.rd}">${c.ok?'✓':'✗'} ${c.label}</span>
      <span style="color:${C.mu}">${c.val}</span>
    </div>`).join('')}
    ${pass?`<div style="margin-top:6px;font-size:9px;color:${C.mu}">예상 ROI = (1 - 합계) / 합계 × 100 = <b style="color:${C.gr}">+${((1-sum)/sum*100).toFixed(1)}%</b></div>`:''}
  </div>`;
}

async function runWeatherForecast(){
  if(!getKey()){toast("API 키 필요",C.rd);return}

  const prompt=`You are a meteorological forecaster for ${s.city} on ${s.date||'today'}.

- Station climatology: 30-yr mean=${s.climMean||'N/A'}°F, std=${s.climStd||'N/A'}
- Yesterday high: ${s.yestHigh||'N/A'}°F (forecast was ${s.yestForecast||'N/A'}°F)
- Recent 14-day forecast bias: ${s.biasPp||0}pp on average

Output ONLY a valid JSON object with no extra text:
{
  "mean": <point estimate °F>,
  "std": <uncertainty °F>,

  "uhi_adjustment": <pp shift for urban heat island>,

    wState.edges=wState.binProbs.map((p,i)=>p-(wState.marketPrices[i]||0));

    const {core, hedges, highUnc}=wState.marketPrices.some(p=>p>0)

function calcKellyRef(){
  const mp=parseFloat(document.getElementById('kc-model')?.value)/100;
  const pp=parseFloat(document.getElementById('kc-mkt')?.value);
  const res=document.getElementById('kc-res');
  if(!mp||!pp||mp<=pp||pp<=0){if(res)res.innerHTML=`<span style="color:${C.mu}">값 입력 시 계산</span>`;return}
  const fk=kellyFraction(mp,pp,1), adj=kellyFraction(mp,pp,0.25);
  const bet=(bankroll*adj).toFixed(0);
  const ev=(mp*(1-pp)-(1-mp)*pp).toFixed(4);
  if(res)res.innerHTML=`<div class="g2" style="text-align:left">
    ${kv("EV",(ev>0?"+":"")+ev,ev>0?C.gr:C.rd)}
    ${kv("풀 켈리",(fk*100).toFixed(1)+"%")}
    ${kv("적용(25%)",(adj*100).toFixed(1)+"%",C.ac)}
    ${kv("베팅액","$"+bet,C.br)}
  </div>`;
}

function saveCFEntry(id,held){
  const t=trades.find(x=>x.id===id);
  if(!t)return;
  const v=parseFloat(held);
  if(isNaN(v))return;
  t.held_pnl=v;
  saveAll();
  toast(`반사실 +$${v} 저장됨`,C.yw);
  renderCFTab();
}

function renderCFTab(){
  const el=document.getElementById('tab-cf');
  const res=trades.filter(t=>t.outcome);
  const actualPnl=res.reduce((a,t)=>a+(t.pnl||0),0);
  const cfTrades=res.filter(t=>t.held_pnl!=null);
  const heldPnl=cfTrades.reduce((a,t)=>a+(t.held_pnl||0),0);
  const leftOnTable=heldPnl-actualPnl;
  const exitScore=heldPnl>0?Math.max(0,Math.round(actualPnl/heldPnl*100)):null;

  // pending cf trades (no outcome yet)
  const pending=trades.filter(t=>!t.outcome);

  let h=`<div class="fade" style="padding:12px">

  <!-- SUMMARY -->
  <div class="sec" style="border-color:${C.yw}33">
    <div class="stitle">🔬 반사실 분석 (Counterfactual)</div>
    <div class="g3" style="margin-bottom:10px">
      <div class="stat-b">
        <div class="sv" style="color:${actualPnl>=0?C.gr:C.rd}">${actualPnl>=0?"+":""}$${actualPnl.toFixed(0)}</div>
        <div class="sl">실제 PnL</div>
      </div>
      <div class="stat-b">

        <div class="sl">홀드시 PnL</div>
      </div>
      <div class="stat-b">
        <div class="sv" style="color:${C.rd}">${leftOnTable>0?"-":""}$${Math.abs(leftOnTable).toFixed(0)}</div>
        <div class="sl">놓친 수익</div>
      </div>
    </div>
    ${exitScore!=null?`
    <div style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:9px;color:${C.mu};margin-bottom:4px">
        <span>Exit 효율</span><span style="color:${exitScore>60?C.gr:exitScore>30?C.yw:C.rd};font-weight:700">${exitScore}%</span>
      </div>
      <div class="prog"><div class="prog-f" style="width:${exitScore}%;background:${exitScore>60?C.gr:exitScore>30?C.yw:C.rd}"></div></div>

    ${cfTrades.length===0?`<div style="font-size:10px;color:${C.mu};text-align:center;padding:8px">반사실 데이터 없음 — 아래에서 입력하세요</div>`:''}
  </div>

  <!-- CF TRADE LIST (trades with outcome + held_pnl) -->
  ${cfTrades.length?`<div class="sec">
    <div class="stitle">📊 반사실 기록</div>
    ${cfTrades.map(t=>{
      const ratio=t.held_pnl>0?(t.pnl||0)/t.held_pnl:0;
      const pct=Math.round(ratio*100);
      const dt=new Date(t.ts).toLocaleString("ko-KR",{month:"2-digit",day:"2-digit"});
      return`<div style="background:var(--p2);border-radius:4px;padding:10px;margin-bottom:7px">

      <div style="display:flex;gap:6px;align-items:center">
        <span style="font-size:9px;color:${t.pnl>=0?C.gr:C.rd};white-space:nowrap">실제 ${t.pnl>=0?"+":""}$${Math.abs(t.pnl||0).toFixed(0)}</span>
        <input type="number" id="cf-manual-${t.id}" value="${t.held_pnl||''}" placeholder="홀드시 PnL..." style="font-size:11px;flex:1;text-align:center">
        <button onclick="saveCFEntry(${t.id},document.getElementById('cf-manual-${t.id}').value)" style="padding:5px 10px;background:${C.yw}18;border:1px solid ${C.yw}44;border-radius:3px;color:${C.yw};font-family:var(--fn);font-size:9px;cursor:pointer;white-space:nowrap">저장</button>
      </div>
    </div>`).join('')}
  </div>

  <!-- PENDING (no outcome yet) -->
  ${pending.length?`<div class="sec">
    <div class="stitle">⏳ 결과 대기 중</div>
    ${pending.map(t=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd)55;font-size:10px">
      <span style="color:var(--br);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px">${t.market||"(없음)"}</span>
      <span style="color:${C.mu};font-size:9px">$${t.price||"--"}</span>
    </div>`).join('')}
  </div>`:''}

  <!-- ventry089 REFERENCE -->
  <div class="sec" style="border-color:${C.pu}33">
    <div class="stitle" style="color:${C.pu}">📌 ventry089 벤치마크</div>
    <div style="font-size:9px;color:${C.mu};margin-bottom:8px">24h paper mode 기준 (날씨봇)</div>
    ${[["Ankara","$27","+$1,156","×43"],["Buenos Aires","$20","+$520","×26"],["Tokyo","$12","+$51","×4"]].map(([city,act,held,mult])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd)55;font-size:10px">
      <span style="color:var(--br);font-weight:700;width:90px">${city}</span>
      <span style="color:${C.gr}">${act}</span>
      <span style="color:${C.yw}">${held}</span>
      <span style="color:${C.rd};font-size:9px">${mult}</span>
    </div>`).join('')}
    <div style="margin-top:8px;font-size:9px;color:${C.mu};line-height:1.6">실제 PnL: <b style="color:${C.gr}">+$20.65</b> → 홀드시: <b style="color:${C.yw}">+$1,761.77</b><br>Exit 효율: <b style="color:${C.rd}">1.2%</b> — trailing stop이 수익을 99% 잠식</div>
  </div>

  </div>`;
  el.innerHTML=h;
}
